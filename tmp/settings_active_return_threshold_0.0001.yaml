project:
  name: btc-polymarket-v1
  timezone: UTC

market:
  exchange: binance
  pair: BTC/USDT
  timeframe: 1m

horizons:
  active: ["5m", "15m"]
  specs:
    "5m":
      minutes: 5
      grid_minutes: 5
      label_builder: grid_direction
      label_params:
        label_version: v2
      feature_profile: core_5m
      signal_policy: two_stage_policy
      sizing_plugin: fixed_fraction
    "15m":
      minutes: 15
      grid_minutes: 15
      label_builder: grid_direction
      label_params:
        label_version: v1
      feature_profile: core_15m
      signal_policy: default_edge_policy_15m
      sizing_plugin: fixed_fraction

dataset:
  train_start: "2024-01-01"
  train_end: "2026-12-31"
  validation_window_days: 30
  strict_grid_only: true
  drop_incomplete_candles: true
  walk_forward:
    enabled: false
  threshold_search:
    stage1_coverage_min: 0.60
    stage1_coverage_max: 0.80
    min_active_samples: 25
    min_end_to_end_coverage: 0.30
  sample_quality_filter:
    enabled: false
    min_nz_volume_share_20: 0.60
    max_flat_share_20: 0.70

labels:
  two_stage:
    active_return_threshold: 0.0001

features:
  profiles:
    core_5m:
      packs:
        - momentum
        - momentum_acceleration
        - volatility
        - path_structure
        - regime
        - volume
        - candle_structure
        - market_quality
        - htf_context
        - compression_breakout
        - asymmetry
        - flow_proxy
        - intra_5m_structure
        - lagged
        - time
        - derivatives_funding
        - derivatives_basis
        - derivatives_book_ticker
        - derivatives_oi
        - derivatives_options
      momentum_windows: [1, 3, 5, 10, 15]
      vol_windows: [3, 5, 10, 30]
      volume_windows: [3, 5, 10, 20]
      market_quality_windows: [5, 20]
      slope_windows: [3, 5]
      range_windows: [3, 5, 10]
      htf_context_timeframes: [5, 15]
      htf_context_vol_window: 5
      htf_context_range_window: 5
      htf_context_zscore_window: 5
      htf_context_efficiency_window: 5
      htf_context_trend_strength_window: 5
      lagged_feature_names:
        - ret_1
        - ret_3
        - rv_5
        - signed_volume_1
        - nz_volume_share_5
        - flat_share_5
        - body_pct_1
        - close_location_1
      lagged_feature_lags: [1, 2, 3]
      compression_window: 20
      compression_rank_window: 100
      compression_atr_short_window: 5
      compression_atr_long_window: 20
      compression_nr_windows: [4, 7]
      asymmetry_rv_windows: [5, 20]
      asymmetry_skew_windows: [10, 20]
      asymmetry_imbalance_windows: [3, 5]
      flow_volume_window: 3
      use_vwap_distance: true
      use_regime_features: true
      use_time_features: true
    core_15m:
      packs:
        - momentum
        - momentum_acceleration
        - volatility
        - path_structure
        - regime
        - volume
        - candle_structure
        - market_quality
        - htf_context
        - compression_breakout
        - asymmetry
        - flow_proxy
        - lagged
        - time
      momentum_windows: [1, 3, 5, 10]
      vol_windows: [3, 5, 10, 20]
      volume_windows: [3, 5, 10, 20]
      market_quality_windows: [5, 20]
      slope_windows: [3, 5]
      range_windows: [3, 5, 10]
      htf_context_timeframes: [15, 60]
      lagged_feature_names:
        - ret_1
        - ret_3
        - rv_5
        - signed_volume_1
        - nz_volume_share_5
        - flat_share_5
      lagged_feature_lags: [1, 2, 3]
      compression_window: 20
      compression_rank_window: 100
      compression_atr_short_window: 5
      compression_atr_long_window: 20
      compression_nr_windows: [4, 7]
      asymmetry_rv_windows: [5, 20]
      asymmetry_skew_windows: [10, 20]
      asymmetry_imbalance_windows: [3, 5]
      flow_volume_window: 3
      use_vwap_distance: true
      use_regime_features: true
      use_time_features: true

derivatives:
  enabled: true
  exchange: binance
  symbol_spot: BTCUSDT
  symbol_perp: BTCUSDT
  path_mode: latest
  funding:
    enabled: true
    source: binance
    path: ./artifacts/data/derivatives/binance_btcusdt_funding.parquet
    archive_path: ./artifacts/data/binance_public/normalized
    ffill_until_next: true
    zscore_window: 720
  basis:
    enabled: true
    source: binance
    path: ./artifacts/data/derivatives/binance_btcusdt_basis.parquet
    archive_path: ./artifacts/data/binance_public/normalized
    use_mark_price: true
    use_index_price: true
    use_premium_index: true
    zscore_window: 720
  oi:
    enabled: false
    path: null
    archive_path: ./artifacts/data/binance_public/normalized
    frequency: 5m
    zscore_window: 288
    change_windows: [5, 60]
    slope_window: 5
  options:
    enabled: false
    source: deribit
    path: null
    archive_path: ./artifacts/data/binance_public/normalized
    zscore_window: 288
    change_window: 60
    regime_zscore_threshold: 1.0
  book_ticker:
    enabled: false
    source: binance
    path: null
    archive_path: ./artifacts/data/binance_public/normalized
    zscore_window: 288

data_backfill:
  provider: binance-public
  start_date: "2024-01-01"
  use_monthly_for_full_months: true
  use_daily_for_open_month_tail: true
  verify_checksum: true
  spot:
    enabled: true
    symbols: ["BTCUSDT"]
    data_types:
      klines:
        intervals: ["1m"]
      aggTrades: {}
      trades: {}
  futures_um:
    enabled: true
    symbols: ["BTCUSDT"]
    data_types:
      klines:
        intervals: ["1m"]
      markPriceKlines:
        intervals: ["1m"]
      indexPriceKlines:
        intervals: ["1m"]
      premiumIndexKlines:
        intervals: ["1m"]
      fundingRate: {}
      bookTicker: {}
      metrics: {}
      aggTrades: {}
      trades: {}
      bookDepth: {}
      liquidationSnapshot: {}
  futures_cm:
    enabled: true
    symbols: ["BTCUSD_PERP"]
    data_types:
      klines:
        intervals: ["1m"]
      markPriceKlines:
        intervals: ["1m"]
      indexPriceKlines:
        intervals: ["1m"]
      premiumIndexKlines:
        intervals: ["1m"]
      fundingRate: {}
      bookTicker: {}
      metrics: {}
      aggTrades: {}
      trades: {}
      bookDepth: {}
      liquidationSnapshot: {}
  option:
    enabled: true
    symbols:
      BVOLIndex: ["BTCBVOLUSDT"]
      EOHSummary: ["BTCUSDT"]

model:
  active_plugins:
    stage1: lightgbm_stage1
    stage2: lightgbm_stage2
  plugins:
    lightgbm_stage1:
      n_estimators: 400
      learning_rate: 0.03
      num_leaves: 30
      min_child_samples: 500
      subsample: 1
      subsample_freq: 1
      colsample_bytree: 1
      reg_alpha: 0.8
      reg_lambda: 2.0
      max_depth: 6
      scale_pos_weight: null
      verbosity: -1
      random_state: 42
      early_stopping_rounds: 60
      eval_metric: binary_logloss
    lightgbm_stage2:
      n_estimators: 500
      learning_rate: 0.03
      num_leaves: 30
      min_child_samples: 150
      subsample: 0.8
      subsample_freq: 1
      colsample_bytree: 1
      reg_alpha: 0.8
      reg_lambda: 2.0
      max_depth: 6
      verbosity: -1
      random_state: 42
      early_stopping_rounds: 60
      eval_metric: multi_logloss
    catboost:
      iterations: 300
      learning_rate: 0.03
      depth: 10
      l2_leaf_reg: 5.0
      random_seed: 42
      loss_function: Logloss
      eval_metric: Logloss
      verbose: false
    logistic:
      C: 0.5
      max_iter: 1000
      solver: lbfgs
      random_state: 42
  stage2_class_weight:
    0: 3.0
    1: 1.0
    2: 3.0

calibration:
  active_plugins:
    stage1: none
    stage2: none
  plugins: {}

signal:
  policies:
    two_stage_policy:
      stage1_threshold: null
      up_threshold: null
      down_threshold: null
      margin_threshold: null
    default_edge_policy_15m:
      yes_price_min: 0.40
      yes_price_max: 0.60
      edge_threshold: 0.03

sizing:
  active_plugin: fixed_fraction
  plugins:
    fixed_fraction:
      single_position_cap: 0.02
      max_total_exposure: 0.20

execution:
  mode: paper
  active_adapter: polymarket
  active_mapper: btc_5m_polymarket
  fixed_contract_size: 5.0
  safeguards:
    min_liquidity_clob: 1000.0
    max_spread: 0.10
    require_best_ask: true
    enforce_idempotency_in_paper: false
    idempotency_store_path: ./artifacts/state/live_orders.json
  polymarket:
    host: https://clob.polymarket.com
    gamma_base_url: https://gamma-api.polymarket.com
    chain_id: 137
    signature_type: null
    funder: null
    private_key_env: POLYMARKET_PRIVATE_KEY
    api_key_env: POLYMARKET_API_KEY
    api_secret_env: POLYMARKET_API_SECRET
    api_passphrase_env: POLYMARKET_API_PASSPHRASE
    max_pages: 3
    gamma_timeout_seconds: 5

paths:
  artifacts_dir: ./artifacts
  model_dir: ./artifacts/models
  logs_dir: ./artifacts/logs
