derivatives:
  enabled: true
  exchange: binance
  symbol_spot: BTC/USDT
  symbol_perp: BTC/USDT:USDT
  path_mode: archive
  funding:
    enabled: true
    path: ./artifacts/data_v2/normalized/binance/futures_um/BTCUSDT/derivatives/binance_btcusdt_funding.parquet
    archive_path: ./artifacts/data_v2/normalized
    source: local_file
    ffill_until_next: true
    zscore_window: 720
  basis:
    enabled: true
    path: ./artifacts/data_v2/normalized/binance/futures_um/BTCUSDT/derivatives/binance_btcusdt_basis.parquet
    archive_path: ./artifacts/data_v2/normalized
    source: local_file
    use_mark_price: true
    use_index_price: true
    use_premium_index: true
    zscore_window: 720
  oi:
    enabled: true
    path: null
    archive_path: ./artifacts/data_v2/normalized
    frequency: 5m
    zscore_window: 288
    change_windows:
    - 5
    - 60
    slope_window: 5
  options:
    enabled: true
    path: null
    archive_path: ./artifacts/data_v2/normalized
    source: local_file
    zscore_window: 288
    change_window: 60
    regime_zscore_threshold: 1.0
  book_ticker:
    enabled: true
    path: null
    archive_path: ./artifacts/data_v2/normalized
    source: local_file
    zscore_window: 288
second_level:
  enabled: true
  data_root: ./artifacts/data_v2
  feature_store_version: second_level_v2
  feature_profile: expanded_v2
  feature_store_path: ./artifacts/data_v2/second_level/version=second_level_v2/market=BTCUSDT/second_features_extended
  artifact_root: ./artifacts/data_v2/second_level
  market: BTCUSDT
  exchange: binance
  large_trade_quantile: 0.95
  large_trade_window_seconds: 300
  optimize_metric: balanced_precision
  profiles:
    expanded_v2:
      packs:
      - second_level_momentum
      - second_level_volatility
      - second_level_volume
      - second_level_candle_structure
      - second_level_path_structure
      - second_level_trade_microstructure
      - second_level_book_microstructure
      - second_level_depth
      - second_level_cross_market
      - second_level_interaction_bank
      - second_level_lagged
      windows:
      - 1
      - 3
      - 5
      - 10
      - 15
      - 30
      - 60
      - 120
      - 300
      compact_windows:
      - 5
      - 10
      - 30
      - 60
      - 300
      slope_windows:
      - 5
      - 10
      - 30
      - 60
      range_windows:
      - 5
      - 10
      - 30
      - 60
      - 300
      lagged_feature_names:
