      - sl_trade_count_30s
      - sl_total_volume_30s
      - sl_spread_bps
      - sl_bid_ask_qty_imbalance
      - sl_microprice_premium
      - sl_mirror_ret_30s
      - sl_mirror_relative_volume_30s
      lagged_feature_lags:
      - 1
      - 3
      - 5
      - 10
      - 30
      - 60
data_backfill:
  provider: binance_public
  start_date: '2026-02-01'
  use_monthly_for_full_months: true
  use_daily_for_open_month_tail: true
  use_daily_for_full_month_fallback: true
  verify_checksum: true
  spot:
    enabled: true
    symbols:
    - BTCUSDT
    data_types:
      klines:
        intervals:
        - 1s
        - 1m
      bookTicker: {}
      aggTrades: {}
  futures_um:
    enabled: true
    symbols:
    - BTCUSDT
    data_types:
      klines:
        intervals:
        - 1m
      markPriceKlines:
        intervals:
        - 1m
      indexPriceKlines:
        intervals:
        - 1m
      premiumIndexKlines:
        intervals:
        - 1m
      fundingRate: {}
      bookTicker: {}
      metrics: {}
      bookDepth: {}
  futures_cm:
    enabled: false
    symbols:
    - BTCUSD_PERP
    data_types:
      klines:
        intervals:
        - 1m
      markPriceKlines:
        intervals:
        - 1m
      indexPriceKlines:
        intervals:
        - 1m
      premiumIndexKlines:
        intervals:
        - 1m
      fundingRate: {}
      bookTicker: {}
      metrics: {}
      aggTrades: {}
      trades: {}
      bookDepth: {}
      liquidationSnapshot: {}
  option:
    enabled: true
    symbols:
      BVOLIndex:
      - BTCBVOLUSDT
      EOHSummary:
      - BTCUSDT
model:
  active_plugin: lightgbm
  plugins:
    lightgbm:
      n_estimators: 700
      learning_rate: 0.02
      num_leaves: 20
      min_child_samples: 600
      subsample: 0.9
      subsample_freq: 1
      colsample_bytree: 0.8
      reg_alpha: 5.0
      reg_lambda: 20.0
      max_depth: 6
      scale_pos_weight: 1.42
      verbosity: -1
      random_state: 42
      early_stopping_rounds: 60
      eval_metric: binary_logloss
    catboost:
      iterations: 300
      learning_rate: 0.03
      depth: 10
      l2_leaf_reg: 5.0
      random_seed: 42
      loss_function: Logloss
      eval_metric: Logloss
      verbose: false
    logistic:
      C: 0.5
      max_iter: 1000
      solver: lbfgs
      random_state: 42
calibration:
  active_plugin: none
  plugins: {}
signal:
  policies:
    selective_binary_policy:
      t_up: null
      t_down: null
    default_edge_policy_15m:
      yes_price_min: 0.4
      yes_price_max: 0.6
      edge_threshold: 0.03
sizing:
  active_plugin: fixed_fraction
  plugins:
    fixed_fraction:
      single_position_cap: 0.02
      max_total_exposure: 0.2
execution:
  mode: paper
  active_adapter: polymarket
  active_mapper: btc_5m_polymarket
  fixed_contract_size: 5.0
  safeguards:
    min_liquidity_clob: 1000.0
    max_spread: 0.1
    require_best_ask: true
    enforce_idempotency_in_paper: false
    idempotency_store_path: ./artifacts/state/live_orders.json
  polymarket:
    host: https://clob.polymarket.com
    gamma_base_url: https://gamma-api.polymarket.com
    chain_id: 137
    signature_type: null
    funder: null
    private_key_env: POLYMARKET_PRIVATE_KEY
    api_key_env: POLYMARKET_API_KEY
    api_secret_env: POLYMARKET_API_SECRET
    api_passphrase_env: POLYMARKET_API_PASSPHRASE
    max_pages: 3
    gamma_timeout_seconds: 5
paths:
  artifacts_dir: ./artifacts
  model_dir: ./artifacts/models
  logs_dir: ./artifacts/logs
reporting:
  include_precision_coverage_frontier: true
  include_boundary_slices: true
  include_regime_slices: true
  include_calibration_metrics: false
experiment:
  variant:
    name: soft_conservative_top1200_spw1p42
    category: sample_feature_model_narrow
    overrides:
      model.plugins.lightgbm.num_leaves: 20
      model.plugins.lightgbm.max_depth: 6
      model.plugins.lightgbm.min_child_samples: 600
      model.plugins.lightgbm.reg_alpha: 5.0
      model.plugins.lightgbm.reg_lambda: 20.0
      model.plugins.lightgbm.learning_rate: 0.02
      model.plugins.lightgbm.n_estimators: 700
      model.plugins.lightgbm.scale_pos_weight: 1.42
      model.plugins.lightgbm.subsample: 0.9
      model.plugins.lightgbm.colsample_bytree: 0.8
      sample_weighting.enabled: true
      sample_weighting.min_abs_return: 0.00012
      sample_weighting.full_weight_abs_return: 0.0004
      sample_weighting.min_weight: 0.25
    drop_packs: []
    top_n_features: 1200
