project:
  name: btc-polymarket-v1
  timezone: UTC
market:
  exchange: binance
  pair: BTC/USDT
  timeframe: 1m
objective:
  label: settlement_direction
  optimize_metric: balanced_precision
  min_coverage: 0.6
  tie_breaker_metric: coverage
  balanced_precision_tie_tolerance: 0.002
horizons:
  active:
  - 5m
  specs:
    5m:
      minutes: 5
      grid_minutes: 5
      label_builder: grid_direction
      label_params:
        label_version: settlement_direction_t0_open_to_t4_close_tie_up_v2
      feature_profile: core_5m
      signal_policy: selective_binary_policy
      sizing_plugin: fixed_fraction
    15m:
      minutes: 15
      grid_minutes: 15
      label_builder: grid_direction
      label_params:
        label_version: v1
      feature_profile: core_15m
      signal_policy: default_edge_policy_15m
      sizing_plugin: fixed_fraction
dataset:
  train_start: '2026-02-01'
  train_end: '2026-05-01'
  validation_window_days: 30
  train_window_days: 30
  strict_grid_only: true
  drop_incomplete_candles: true
  walk_forward:
    enabled: false
sample_weighting:
  enabled: true
  mode: linear_ramp
  min_abs_return: 0.00012
  full_weight_abs_return: 0.0004
  min_weight: 0.25
  max_weight: 1.0
threshold_search:
  enabled: true
  t_up_min: 0.5
  t_up_max: 0.6
  t_down_min: 0.4
  t_down_max: 0.5
  step: 0.005
  enforce_min_side_share: false
  min_side_share: 0.2
  min_up_signals: 100
  min_down_signals: 50
  min_total_signals: 150
validation:
  mode: chronological_validation
  train_days: 30
  validation_days: 30
  report_worst_fold: false
labels: {}
